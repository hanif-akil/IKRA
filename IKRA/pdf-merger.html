    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKRA — Professional PDF Merger</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-hover: #334155;
            --border: #334155;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.3);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --danger: #ef4444;
            --success: #10b981;
            --radius-lg: 12px;
            --radius-md: 8px;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            padding: 2rem 1.5rem;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            text-align: center;
        }

        .logo {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }

        .logo em {
            color: var(--accent);
            font-style: normal;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            background: linear-gradient(to bottom right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        main {
            flex: 1;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            padding: 0 1.5rem 4rem;
        }

        .drop-zone {
            background: var(--surface);
            border: 2px dashed var(--border);
            border-radius: var(--radius-lg);
            padding: 4rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .drop-zone:hover {
            border-color: var(--accent);
            background: rgba(59, 130, 246, 0.05);
        }

        .drop-zone.dragover {
            border-color: var(--accent);
            background: rgba(59, 130, 246, 0.1);
            transform: scale(1.01);
        }

        .drop-zone svg {
            width: 48px;
            height: 48px;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        .drop-zone h3 {
            font-size: 1.25rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .drop-zone p {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        #file-input {
            display: none;
        }

        .file-list-container {
            margin-top: 2rem;
            display: none;
        }

        .file-list-container.visible {
            display: block;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .file-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 1rem;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: var(--transition);
        }

        .file-item:hover {
            border-color: var(--accent);
            transform: translateX(4px);
        }

        .file-icon {
            width: 40px;
            height: 40px;
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .file-details {
            flex: 1;
            min-width: 0;
        }

        .file-name {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 0.25rem;
        }

        .file-meta {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .file-actions {
            display: flex;
            gap: 0.5rem;
        }

        .action-btn {
            background: var(--surface-hover);
            border: none;
            color: var(--text-secondary);
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .action-btn:hover {
            color: var(--text-primary);
            background: #475569;
        }

        .action-btn.delete:hover {
            background: var(--danger);
            color: white;
        }

        .merge-footer {
            margin-top: 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1.125rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--accent-glow);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            background: var(--border);
            cursor: not-allowed;
            box-shadow: none;
            opacity: 0.7;
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #status-msg {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">IKRA<em> — PDF</em></div>
        <h1>Merge PDF Files</h1>
        <p class="subtitle">Combine multiple PDF documents into a single professional file.</p>
    </header>

    <main>
        <div class="drop-zone" id="drop-zone">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
            </svg>
            <h3>Choose PDFs or drag & drop here</h3>
            <p>Your files are processed locally and never leave your computer.</p>
            <input type="file" id="file-input" multiple accept=".pdf">
        </div>

        <div class="file-list-container" id="file-list-container">
            <div id="file-list"></div>

            <div class="merge-footer">
                <button class="btn-primary" id="merge-btn">
                    <span>Merge PDFs</span>
                    <div class="loading-spinner" id="spinner"></div>
                </button>
                <div id="status-msg"></div>
            </div>
        </div>
    </main>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const fileListContainer = document.getElementById('file-list-container');
        const fileList = document.getElementById('file-list');
        const mergeBtn = document.getElementById('merge-btn');
        const spinner = document.getElementById('spinner');
        const statusMsg = document.getElementById('status-msg');

        let selectedFiles = [];

        // Handle interactions
        dropZone.onclick = () => fileInput.click();

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.onchange = (e) => handleFiles(e.target.files);

        function handleFiles(files) {
            const pdfs = Array.from(files).filter(f => f.type === 'application/pdf');
            if (pdfs.length === 0) return;

            pdfs.forEach(file => {
                selectedFiles.push({
                    id: Math.random().toString(36).substr(2, 9),
                    file: file
                });
            });

            renderFileList();
            fileListContainer.classList.add('visible');
        }

        function renderFileList() {
            fileList.innerHTML = '';
            selectedFiles.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'file-item';
                div.innerHTML = `
                    <div class="file-icon">
                        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                        </svg>
                    </div>
                    <div class="file-details">
                        <div class="file-name">${item.file.name}</div>
                        <div class="file-meta">${(item.file.size / 1024 / 1024).toFixed(2)} MB</div>
                    </div>
                    <div class="file-actions">
                        <button class="action-btn" onclick="moveItem(${index}, -1)" ${index === 0 ? 'disabled' : ''}>
                            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M5 15l7-7 7 7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </button>
                        <button class="action-btn" onclick="moveItem(${index}, 1)" ${index === selectedFiles.length - 1 ? 'disabled' : ''}>
                            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M19 9l-7 7-7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </button>
                        <button class="action-btn delete" onclick="removeItem('${item.id}')">
                            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </button>
                    </div>
                `;
                fileList.appendChild(div);
            });

            mergeBtn.disabled = selectedFiles.length < 2;
        }

        window.moveItem = (index, direction) => {
            const target = index + direction;
            if (target >= 0 && target < selectedFiles.length) {
                const temp = selectedFiles[index];
                selectedFiles[index] = selectedFiles[target];
                selectedFiles[target] = temp;
                renderFileList();
            }
        };

        window.removeItem = (id) => {
            selectedFiles = selectedFiles.filter(i => i.id !== id);
            renderFileList();
            if (selectedFiles.length === 0) {
                fileListContainer.classList.remove('visible');
            }
        };

        mergeBtn.onclick = async () => {
            if (selectedFiles.length < 2) return;

            try {
                setLoading(true);
                statusMsg.textContent = 'Merging PDF files...';

                const mergedPdf = await PDFLib.PDFDocument.create();

                for (const item of selectedFiles) {
                    const bytes = await item.file.arrayBuffer();
                    const pdf = await PDFLib.PDFDocument.load(bytes);
                    const pages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                    pages.forEach(page => mergedPdf.addPage(page));
                }

                const mergedBytes = await mergedPdf.save();
                downloadFile(mergedBytes, "IKRA_Merged.pdf");

                statusMsg.textContent = 'Merge successful!';
                setTimeout(() => statusMsg.textContent = '', 3000);
            } catch (err) {
                console.error(err);
                statusMsg.textContent = 'Error: ' + err.message;
                statusMsg.style.color = 'var(--danger)';
            } finally {
                setLoading(false);
            }
        };

        function setLoading(isLoading) {
            spinner.style.display = isLoading ? 'block' : 'none';
            mergeBtn.disabled = isLoading;
            mergeBtn.querySelector('span').textContent = isLoading ? 'Merging...' : 'Merge PDFs';
        }

        function downloadFile(data, fileName) {
            const blob = new Blob([data], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>

    <footer
        style="margin-top: 4rem; padding: 2rem; border-top: 1px solid var(--glass-border); width: 100%; text-align: center; color: var(--text-secondary); font-size: 0.9rem;">
        <p>Created by <strong>Md Abu Hanif Akil</strong> &copy; 2026</p>
    </footer>

</body>


</html>
