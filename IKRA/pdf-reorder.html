<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKRA — PDF Page Reorder</title>
    <!-- Libraries -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-hover: #334155;
            --border: #334155;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.3);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --danger: #ef4444;
            --radius-lg: 12px;
            --radius-md: 8px;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            padding: 2rem 1.5rem;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
            text-align: center;
        }

        .logo {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }

        .logo em {
            color: var(--accent);
            font-style: normal;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            background: linear-gradient(to bottom right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        main {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            padding: 0 1.5rem 4rem;
        }

        .drop-zone {
            background: var(--surface);
            border: 2px dashed var(--border);
            border-radius: var(--radius-lg);
            padding: 4rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 2rem;
        }

        .drop-zone:hover {
            border-color: var(--accent);
            background: rgba(59, 130, 246, 0.05);
        }

        .drop-zone.dragover {
            border-color: var(--accent);
            background: rgba(59, 130, 246, 0.1);
            transform: scale(1.01);
        }

        #file-input {
            display: none;
        }

        .controls {
            display: none;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .controls.visible {
            display: flex;
        }

        .btn {
            background: var(--surface);
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius-md);
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover:not(:disabled) {
            background: var(--surface-hover);
            border-color: var(--accent);
        }

        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn-primary:hover:not(:disabled) {
            background: #2563eb;
            box-shadow: 0 6px 20px var(--accent-glow);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1.5rem;
            padding: 1rem;
        }

        .page-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0.5rem;
            cursor: grab;
            transition: var(--transition);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            user-select: none;
        }

        .page-card:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .page-card:active {
            cursor: grabbing;
        }

        .page-delete-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: var(--danger);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s ease, transform 0.2s ease;
            z-index: 10;
            line-height: 1;
            padding: 0;
        }

        .page-card:hover .page-delete-btn {
            opacity: 1;
        }

        .page-delete-btn:hover {
            transform: scale(1.15);
            background: #dc2626;
        }

        .page-thumb {
            width: 100%;
            aspect-ratio: 1 / 1.414;
            /* Standard A4 aspect ratio */
            background: #fff;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page-thumb canvas {
            max-width: 100%;
            max-height: 100%;
            display: block;
        }

        .page-num {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 8px;
            border-radius: 4px;
        }

        /* Sorting Styles */
        .sortable-ghost {
            opacity: 0.3;
            transform: scale(0.9);
        }

        .sortable-drag {
            cursor: grabbing;
        }

        #loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p id="loading-text">Processing PDF...</p>
    </div>

    <header>
        <div class="logo">IKRA<em> — PDF</em></div>
        <h1>Reorder PDF Pages</h1>
        <p class="subtitle">Drag and drop pages to rearrange your document exactly how you want it.</p>
    </header>

    <main>
        <div class="drop-zone" id="drop-zone">
            <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="var(--accent)"
                style="margin-bottom: 1rem;">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
            </svg>
            <h3>Choose a PDF to reorder</h3>
            <p>Select one file to begin rearranging pages.</p>
            <input type="file" id="file-input" accept=".pdf">
        </div>

        <div class="controls" id="controls">
            <button class="btn" id="clear-btn">
                <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path
                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                Clear
            </button>
            <button class="btn btn-primary" id="save-btn">
                <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                Save Reordered PDF
            </button>
        </div>

        <div class="grid-container" id="grid"></div>
    </main>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const grid = document.getElementById('grid');
        const controls = document.getElementById('controls');
        const saveBtn = document.getElementById('save-btn');
        const clearBtn = document.getElementById('clear-btn');
        const overlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');

        let originalPdfBytes = null;
        let pdfDoc = null;
        let sortable = null;

        // Sorting initialization
        sortable = new Sortable(grid, {
            animation: 150,
            ghostClass: 'sortable-ghost',
            dragClass: 'sortable-drag'
        });

        dropZone.onclick = () => fileInput.click();
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });

        fileInput.onchange = (e) => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        };

        async function handleFile(file) {
            if (file.type !== 'application/pdf') return;

            showLoading('Loading PDF pages...');
            try {
                originalPdfBytes = await file.arrayBuffer();
                // Pass a copy to pdf.js so the original ArrayBuffer stays valid for pdf-lib
                const loadingTask = pdfjsLib.getDocument({ data: originalPdfBytes.slice(0) });
                pdfDoc = await loadingTask.promise;

                grid.innerHTML = '';
                for (let i = 1; i <= pdfDoc.numPages; i++) {
                    await renderThumbnail(i);
                }

                dropZone.style.display = 'none';
                controls.classList.add('visible');
            } catch (err) {
                console.error(err);
                alert('Error loading PDF: ' + err.message);
            } finally {
                hideLoading();
            }
        }

        async function renderThumbnail(pageNum) {
            const page = await pdfDoc.getPage(pageNum);
            const viewport = page.getViewport({ scale: 0.3 });
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            await page.render({ canvasContext: context, viewport: viewport }).promise;

            const card = document.createElement('div');
            card.className = 'page-card';
            card.dataset.pageNum = pageNum - 1; // 0-indexed for pdf-lib
            card.innerHTML = `
                <button class="page-delete-btn" title="Delete page" onclick="deletePage(this)">✕</button>
                <div class="page-thumb"></div>
                <div class="page-num">Page ${pageNum}</div>
            `;
            card.querySelector('.page-thumb').appendChild(canvas);
            grid.appendChild(card);
        }

        saveBtn.onclick = async () => {
            showLoading('Generating new PDF...');
            try {
                // Get order from grid
                const order = Array.from(grid.children).map(card => parseInt(card.dataset.pageNum));

                const srcDoc = await PDFLib.PDFDocument.load(originalPdfBytes);
                const outDoc = await PDFLib.PDFDocument.create();

                const pages = await outDoc.copyPages(srcDoc, order);
                pages.forEach(p => outDoc.addPage(p));

                const outBytes = await outDoc.save();
                const blob = new Blob([outBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'IKRA_Reordered.pdf';
                a.click();
                URL.revokeObjectURL(url);
            } catch (err) {
                console.error(err);
                alert('Error saving PDF: ' + err.message);
            } finally {
                hideLoading();
            }
        };

        function deletePage(btn) {
            const card = btn.closest('.page-card');
            card.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
            card.style.opacity = '0';
            card.style.transform = 'scale(0.8)';
            setTimeout(() => {
                card.remove();
                renumberPages();
                // If no pages left, go back to drop zone
                if (grid.children.length === 0) {
                    clearBtn.onclick();
                }
            }, 300);
        }

        function renumberPages() {
            Array.from(grid.children).forEach((card, i) => {
                card.querySelector('.page-num').textContent = `Page ${i + 1}`;
            });
        }

        clearBtn.onclick = () => {
            grid.innerHTML = '';
            controls.classList.remove('visible');
            dropZone.style.display = 'block';
            originalPdfBytes = null;
            pdfDoc = null;
            fileInput.value = '';
        };

        function showLoading(text) {
            loadingText.textContent = text;
            overlay.style.display = 'flex';
        }

        function hideLoading() {
            overlay.style.display = 'none';
        }
    </script>

    <footer
        style="margin-top: 4rem; padding: 2rem; border-top: 1px solid var(--glass-border); width: 100%; text-align: center; color: var(--text-secondary); font-size: 0.9rem;">
        <p>Created by <strong>Md Abu Hanif Akil</strong> &copy; 2026</p>
    </footer>

</body>


</html>
